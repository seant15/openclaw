services:
  openclaw:
    image: coollabsio/openclaw:latest
    labels:
      - "traefik.http.services.openclaw-ug0g8cs4kkw0040cwsswk40c-openclaw.loadbalancer.server.port=9090"
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "9091:9091"  # OpenClaw Control Center Dashboard
    environment:
      # Provider (at least one required)
      #- ANTHROPIC_API_KEY=sk-ant-...
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - OPENCLAW_PRIMARY_MODEL=opencode/kimi-k2.5
      # Auth
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      # Browser sidecar
      - BROWSER_CDP_URL=http://browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true
      # Hooks (optional)
      # - HOOKS_ENABLED=true
      # - HOOKS_TOKEN=my-hook-secret
    volumes:
      - /opt/openclaw/data:/data
      # Optional: custom JSON config for complex settings (groups, plugins, etc.)
      # - ./my-openclaw.json:/app/config/openclaw.json
    depends_on:
      - browser
    restart: unless-stopped
    networks:
      - default
      - coolify

  browser:
    image: coollabsio/openclaw-browser:latest
    # No port exposure needed — proxied via openclaw at /browser/
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - browser-data:/config
    shm_size: 2g
    restart: unless-stopped
    networks:
      - default

volumes:
  openclaw-data:
  browser-data:
  
networks:
  coolify:
    external: true
